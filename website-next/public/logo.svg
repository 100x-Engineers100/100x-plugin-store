<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <pattern id="diag" patternUnits="userSpaceOnUse" width="60" height="60" patternTransform="rotate(25)">
      <line x1="0" y1="30" x2="60" y2="30" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="8 8"/>
    </pattern>
  </defs>
  <rect width="200" height="200" rx="24" fill="#E8513A"/>
  <rect width="200" height="200" rx="24" fill="url(#diag)"/>
  <text x="50%" y="57%" dominant-baseline="middle" text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-weight="900" font-size="72" fill="white" letter-spacing="-2">100x</text>
</svg>
